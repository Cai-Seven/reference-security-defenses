name: NPM Supply Chain Guard

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch: {}   # 允许你在网页上点按钮手动运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) 拉取业务仓库代码（必须有 package.json 才能检查）
      - name: Checkout app repo
        uses: actions/checkout@v4

      # 2) 安装 Node（让校验脚本能跑）
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3) 拉取“策略仓库”：脚本 + rules + whitelist（集中管理）
      - name: Checkout security defenses repo
        uses: actions/checkout@v4
        with:
          repository: <org-or-owner>/reference-security-defenses
          ref: main
          path: .guard
          # 如果 reference-security-defenses 是私有仓库，取消注释并配置 token：
          # token: ${{ secrets.GUARD_REPO_READ_TOKEN }}

      # 4) 运行安装前校验：失败就会直接让 job 失败，从而阻断 npm install
      - name: Validate dependencies before npm install
        env:
          MAX_PACKAGE_AGE_DAYS: "14"
          NPM_REGISTRY_URL: "https://registry.npmjs.org"
          WHITELIST_FILE: ".guard/config/package-whitelist.json"
          RULES_CONFIG_FILE: ".guard/config/rules.config.json"
          AUDIT_LOG_FILE: "npm-guard-audit.log"
          PACKAGE_JSON_FILE: "package.json"
        run: node .guard/scripts/npm-install-interceptor.js

      # 5) 只有校验通过才会执行 npm install
      - name: npm install
        run: npm install

      # 6) 永远上传审计日志（便于你看失败原��）
      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-guard-audit
          path: npm-guard-audit.log
