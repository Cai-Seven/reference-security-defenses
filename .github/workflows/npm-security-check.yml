name: NPM Supply Chain Security Check

on:
  push:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/npm-security-check.yml'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:
    inputs:
      maxAgeDays:
        description: 'Maximum package age in days'
        required: false
        default: '14'

jobs:
  security-check:
    runs-on: ubuntu-latest
    name: Validate NPM Dependencies

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Create log directory
        run: mkdir -p logs

      - name: Run NPM Security Interceptor
        env:
          NPM_REGISTRY_URL: https://registry.npmjs.org
          MAX_PACKAGE_AGE_DAYS: ${{ github.event.inputs.maxAgeDays || '14' }}
          WHITELIST_FILE: ./config/package-whitelist.json
          RULES_CONFIG_FILE: ./config/rules.config.json
          AUDIT_LOG_FILE: ./logs/npm-install-audit.log
          PACKAGE_JSON_FILE: package.json
        run: node scripts/npm-install-interceptor.js

      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: npm-security-audit-log
          path: logs/npm-install-audit.log
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ NPM supply chain security check failed. Please review the audit log for details.'
            })
