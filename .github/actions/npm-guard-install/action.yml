runs:
  using: "composite"
  steps:
    - name: Checkout security defenses repo
      uses: actions/checkout@v4
      with:
        repository: Cai-Seven/reference-security-defenses
        ref: main
        path: .guard

    - name: Prepare logs
      shell: bash
      run: mkdir -p logs

    # 关键：不再阻断；生成“安全版本建议表”
    - name: Resolve safe versions (no block)
      shell: bash
      env:
        MAX_PACKAGE_AGE_DAYS: ${{ inputs.max_age_days }}
        NPM_REGISTRY_URL: ${{ inputs.registry_url }}
        RULES_CONFIG_FILE: ${{ inputs.rules_config_file }}
        WHITELIST_FILE: ${{ inputs.whitelist_file }}
        AUDIT_LOG_FILE: "logs/npm-guard-audit.log"
        PACKAGE_JSON_FILE: "package.json"
        RESOLUTION_FILE: "logs/npm-guard-resolution.json"
      run: node .guard/scripts/resolve-safe-versions.js

    # 关键：把依赖临时改成安全版本（只改 runner 工作区，不提交）
    - name: Apply safe versions to package.json (runner only)
      shell: bash
      env:
        RESOLUTION_FILE: "logs/npm-guard-resolution.json"
      run: node .guard/scripts/apply-safe-versions.js

    # 生成临时 lockfile + 用 lockfile 固定安装
    - name: Generate package-lock.json (runner only)
      shell: bash
      run: |
        rm -rf node_modules
        npm install --package-lock-only --ignore-scripts

    - name: Install from lockfile
      shell: bash
      run: |
        npm ci --ignore-scripts

    - name: Show resolved direct dependency versions
      shell: bash
      run: |
        node - <<'NODE'
        const fs = require('fs');
        const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
        console.log('dependencies:', pkg.dependencies || {});
        console.log('devDependencies:', pkg.devDependencies || {});
        NODE
