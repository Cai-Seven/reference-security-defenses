name: "npm-guard-install"
description: "Auto-resolve safe versions (age-gated) and install deterministically"
inputs:
  max_age_days:
    description: "Minimum age of package versions (days)"
    required: false
    default: "14"
  registry_url:
    description: "NPM registry URL"
    required: false
    default: "https://registry.npmjs.org"
  rules_config_file:
    description: "Path to rules config in defenses repo (reserved for compatibility)"
    required: false
    default: ".guard/config/rules.config.json"
  whitelist_file:
    description: "Path to whitelist in defenses repo (reserved for compatibility)"
    required: false
    default: ".guard/config/package-whitelist.json"

runs:
  using: "composite"
  steps:
    - name: Checkout security defenses repo
      uses: actions/checkout@v4
      with:
        repository: Cai-Seven/reference-security-defenses
        ref: main
        path: .guard

    - name: Prepare logs
      shell: bash
      run: mkdir -p logs

    # Resolve safe versions and apply them to package.json in the current workspace
    # (runner only; nothing is committed back to the app repo).
    - name: Resolve + apply safe versions (runner only)
      shell: bash
      env:
        MAX_PACKAGE_AGE_DAYS: ${{ inputs.max_age_days }}
        NPM_REGISTRY_URL: ${{ inputs.registry_url }}
        RULES_CONFIG_FILE: ${{ inputs.rules_config_file }}
        WHITELIST_FILE: ${{ inputs.whitelist_file }}
        PACKAGE_JSON_FILE: "package.json"
        RESOLUTION_FILE: "logs/npm-guard-resolution.json"
        AUDIT_LOG_FILE: "logs/npm-guard-audit.log"
      run: node .guard/scripts/resolve-and-apply-safe-versions.js

    # Create/refresh lockfile based on the now-safe pinned versions (runner only)
    - name: Generate package-lock.json (runner only)
      shell: bash
      run: |
        rm -rf node_modules
        npm install --package-lock-only --ignore-scripts

    # Deterministic install
    - name: Install from lockfile
      shell: bash
      run: |
        npm ci --ignore-scripts

    - name: Show resolved direct dependency versions
      shell: bash
      run: |
        node - <<'NODE'
        const fs = require('fs');
        const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
        console.log('dependencies:', pkg.dependencies || {});
        console.log('devDependencies:', pkg.devDependencies || {});
        NODE
