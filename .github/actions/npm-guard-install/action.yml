name: "npm-guard-install"
description: "Resolve age-gated safe versions, sync shrinkwrap, then npm install"

runs:
  using: "composite"
  steps:
    - name: Checkout security defenses repo
      uses: actions/checkout@v4
      with:
        repository: Cai-Seven/reference-security-defenses
        ref: main
        path: .guard

    - name: Prepare logs
      shell: bash
      run: mkdir -p logs

    - name: Resolve + apply safe versions (runner only)
      shell: bash
      env:
        PACKAGE_JSON_FILE: "package.json"
        RESOLUTION_FILE: "logs/npm-guard-resolution.json"
        AUDIT_LOG_FILE: "logs/npm-guard-audit.log"
      run: node .guard/scripts/resolve-apply-and-sync-shrinkwrap.js

    - name: Install (always npm install)
      shell: bash
      run: |
        set -euo pipefail
        rm -rf node_modules
        npm install

        if [ ! -f npm-shrinkwrap.json ]; then
          npm shrinkwrap
        fi
